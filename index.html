<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>US Lighthouses Map</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css' rel='stylesheet' />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DIN Pro', Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        #mapTitle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 45;
            color: #000;
            font-size: clamp(36px, 7vw, 80px);
            font-family: 'DIN Pro', Arial, sans-serif;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease, transform 200ms ease;
        }

        #mapTitle.visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 200ms ease;
            display: none;
        }

        #overlay.visible {
            display: block;
            opacity: 1;
            pointer-events: none;
        }

        #overlayStage {
            position: fixed;
            top: calc((100vh - 112px) / 2);
            bottom: auto;
            left: auto;
            right: clamp(20px, 3vw, 44px);
            transform: translateY(-50%);
            width: min(1200px, calc(50vw - 24px), calc(100vw - 120px));
            max-height: calc(100vh - 112px - 16px);
            height: auto;
            box-sizing: border-box;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 24px 24px 8px 8px;
            overflow-y: auto;
            pointer-events: none;
        }

        #overlayCard {
            position: relative;
            width: max-content;
            max-width: 100%;
            max-height: 100%;
            height: auto;
            padding: 0 7.5px 8px 7.5px;
            background: #fff;
            border: 2px solid #000;
            box-sizing: border-box;
            overflow: visible;
            pointer-events: auto;
        }

        #overlayImage {
            position: static;
            width: auto;
            max-width: 100%;
            max-height: clamp(180px, 42vh, 520px);
            object-fit: contain;
            object-position: center center;
            transform: none;
            display: block;
            margin: 18px auto 0 auto;
            border: none;
            background: transparent;
            box-sizing: border-box;
        }

        #textBox {
            position: relative;
            color: #000;
            background: transparent;
            padding: 12px 14px 6px 14px;
            border-radius: 0;
            font-size: 14px;
            line-height: 1.4;
            text-align: left;
            width: max-content;
            max-width: 100%;
            max-height: none;
            overflow: visible;
            z-index: 40;
            box-shadow: none;
            margin-top: 0;
        }

        #textBox .light-circle {
            position: relative;
            display: block;
            margin: 10px auto 0 auto;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #000;
            transition: opacity 200ms ease, transform 200ms ease;
            pointer-events: none;
        }

        #textBox .light-circle.on {
            transform: scale(1.25);
        }

        #textBox .light-circle.off {
            transform: scale(1);
            background: #000;
        }

        #textBox > div {
            margin-bottom: 0;
        }

        #textBox .info-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            align-items: start;
        }

        #textBox .info-section {
            padding: 10px 10px 2px 10px;
        }

        #textBox .info-section + .info-section {
            border-left: 1px solid rgba(0, 0, 0, 0.22);
            padding-left: 14px;
            margin-left: 10px;
        }

        #textBox .info-section-title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 6px;
            font-size: 12px;
        }

        #textBox .info-item {
            margin-bottom: 4px;
            font-size: 13px;
            line-height: 1.35;
        }

        #textBox .info-item:last-child {
            margin-bottom: 0;
        }

        @media (max-width: 780px) {
            #overlayStage {
                right: 20px;
                width: calc(100vw - 40px);
            }

            #textBox .info-columns {
                grid-template-columns: 1fr;
            }

            #textBox .info-section + .info-section {
                border-left: 0;
                border-top: 1px solid rgba(0, 0, 0, 0.22);
                padding-left: 10px;
                padding-top: 12px;
                margin-left: 0;
                margin-top: 8px;
            }
        }

        .detail-divider {
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.14);
            margin: 8px 0;
        }

        #geoInfo, #towerInfo, #sellingInfo {
            position: static;
            color: inherit;
            background: transparent;
            padding: 0;
            border: 0;
            max-width: none;
            max-height: none;
            overflow: visible;
        }

        #geoInfo .line1,
        #towerInfo .line1,
        #sellingInfo .line1,
        #textBox .line1 {
            font-weight: 700;
            margin-bottom: 2px;
        }

        #geoInfo .line1 {
            margin-bottom: 4px;
        }

        #textBox .line3 {
            font-weight: 500;
            margin-bottom: 2px;
        }

        #textBox .line4 {
            font-size: 13px;
            margin-bottom: 6px;
            color: #333;
        }

        #towerInfo .line1 {
            margin-bottom: 2px;
        }

        #towerInfo .line1 {
            font-weight: 600;
            margin-bottom: 2px;
        }

        #closeOverlay {
            position: absolute;
            top: -18px;
            right: -18px;
            left: auto;
            border: 2px solid #000;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #fff;
            color: #000;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 200ms ease, background 200ms ease;
        }

        @keyframes closeOverlayCross {
            0% { transform: scale(1.2) rotate(0deg); }
            25% { transform: scale(1.2) rotate(45deg); }
            50% { transform: scale(1.2) rotate(90deg); }
            75% { transform: scale(1.2) rotate(135deg); }
            100% { transform: scale(1.2) rotate(180deg); }
        }

        #closeOverlay:hover {
            transform: scale(1.2);
            background: #000;
            color: #fff;
            animation: closeOverlayCross 0.2s ease forwards;
        }

        #closeOverlay:active {
            transform: scale(1.1);
            background: #000;
            color: #fff;
            animation: none;
        }

        #titleActions {
            position: fixed;
            top: 0;
            left: 0;
            transform: translateX(-50%);
            z-index: 45;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease;
        }

        #tableLinkBtn,
        #firstStopBtn {
            background: hsl(200, 1%, 70%);
            color: #000;
            text-decoration: none;
            border: 2px solid #000;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            padding: 6px;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 200ms ease, background 200ms ease;
        }

        #mapTitle.visible + #titleActions {
            opacity: 1;
            pointer-events: auto;
        }

        #pauseBtn {
            position: static;
            z-index: 36;
            background: hsl(200, 1%, 70%);
            color: #000;
            border: 2px solid #000;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            padding: 6px;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal;
            cursor: pointer;
            margin-right: 0;
            box-sizing: border-box;
            opacity: 0;
            transform: scale(0.2);
            pointer-events: none;
            transform-origin: center center;
            transition: transform 360ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease-out, background 220ms ease;
        }

        #pauseBtn:hover,
        #tableLinkBtn:hover,
        #firstStopBtn:hover {
            background: #000;
            color: #fff;
            transform: scale(1.1);
        }

        #pauseBtn.is-active {
            background: #000;
            color: #fff;
        }

        .timeline-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 36;
            gap: 8px;
            width: 72px;
            overflow: visible;
        }

        #timeline {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 35;
            pointer-events: auto;
            color: #000;
            background: #fff;
            border: 2px solid #000;
            padding: 8px 18px 10px 18px;
            border-radius: 0;
            display: grid;
            grid-template-columns: 0 1fr;
            grid-template-rows: auto auto;
            column-gap: 12px;
            row-gap: 6px;
            align-items: center;
            transition: grid-template-columns 340ms cubic-bezier(0.22, 1, 0.36, 1) 120ms;
        }

        #timeline.is-slideshow-active {
            grid-template-columns: 72px 1fr;
            transition-delay: 0ms;
        }

        #timeline.is-slideshow-active .timeline-buttons {
            width: 72px;
        }

        #timeline.is-slideshow-active #pauseBtn {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        #timelineTitle {
            grid-column: 1 / -1;
            grid-row: 1;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #000;
            pointer-events: none;
        }

        .timeline-buttons {
            grid-column: 1;
            grid-row: 2;
        }

        #timelineTrack {
            grid-column: 2;
            grid-row: 2;
            position: relative;
            height: 60px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        #timelineLine {
            position: absolute;
            top: 24px;
            left: 0;
            right: 0;
            height: 2px;
            background: #bbb;
        }

        .timelineTickLabel {
            position: absolute;
            top: 38px;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 500;
            color: #bbb;
            white-space: nowrap;
            transition: font-size 200ms ease, color 200ms ease, font-weight 200ms ease;
            cursor: pointer;
        }

        .timelineTickLabel.is-hovered {
            font-size: 13px;
            color: #000;
            font-weight: 600;
        }

        .timelineTickLabel.current-year {
            font-size: 13px;
            color: #000;
            font-weight: 700;
        }

        .timelineTick {
            position: absolute;
            top: 16px;
            width: 12px;
            height: 16px;
            background: linear-gradient(
                to right,
                transparent calc(50% - 1px),
                #bbb calc(50% - 1px),
                #bbb calc(50% + 1px),
                transparent calc(50% + 1px)
            );
            transform: translateX(-50%);
            transition: transform 200ms ease, height 200ms ease, top 200ms ease;
            cursor: pointer;
        }

        .timelineTick.is-hovered {
            transform: translateX(-50%) scaleX(1.8);
            height: 22px;
            top: 13px;
            background: linear-gradient(
                to right,
                transparent calc(50% - 1px),
                #000 calc(50% - 1px),
                #000 calc(50% + 1px),
                transparent calc(50% + 1px)
            );
        }

        .timelineTick.current-year {
            transform: translateX(-50%) scaleX(1.5);
            height: 20px;
            top: 14px;
            background: linear-gradient(
                to right,
                transparent calc(50% - 1px),
                #000 calc(50% - 1px),
                #000 calc(50% + 1px),
                transparent calc(50% + 1px)
            );
        }

        #timelineIndicator {
            position: absolute;
            top: 6px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #000000;
            transform: translateX(-50%);
            display: none;
        }

        #timelineYear {
            position: absolute;
            top: -2px;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            color: #000;
            display: none !important;
            white-space: nowrap;
        }

        .zoom-label {
            background: #fff;
            border: 2px solid #000;
            padding: 3px 9px;
            font-size: 12px;
            font-weight: 400;
            font-family: 'DIN Pro', Arial, sans-serif;
            white-space: pre-line;
            line-height: 1.25;
            text-align: center;
            letter-spacing: 0.04em;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="mapTitle" aria-hidden="true">Pharophiles</div>
    <div id="titleActions">
        <a id="tableLinkBtn" href="table/index.html">Open Table</a>
        <button id="firstStopBtn" type="button">First Stop</button>
    </div>
    <div id="overlay" aria-hidden="true">
        <div id="overlayStage">
            <div id="overlayCard">
                <button id="closeOverlay" type="button" aria-label="Close">×</button>
                <img id="overlayImage" alt="Lighthouse image">
                <div id="textBox">
                <div id="geoInfo">
                    <div class="line1"></div>
                    <div class="line2"></div>
                </div>
                <div id="towerInfo">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                    <div class="line4"></div>
                    <div class="line5"></div>
                </div>
                <div id="sellingInfo">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </div>
            </div>
        </div>
    </div>
    <div id="timeline" aria-hidden="true">
        <div id="timelineTitle">Timline of the conveyd lighthouses</div>
        <div class="timeline-buttons">
            <button id="pauseBtn" type="button">Pause</button>
        </div>
        <div id="timelineTrack">
            <div id="timelineLine"></div>
            <div id="timelineTicks"></div>
            <div id="timelineIndicator"></div>
            <div id="timelineYear"></div>
        </div>
    </div>

    <script>
        const CSV_FILE = 'table/UsLighthouses_Dataset_Web.csv';
        const SAT_IMAGE_FOLDER = 'table/images_sat';
        const PHOTO_IMAGE_FOLDER = 'table/images';
        const IMG_MIN_HEIGHT = '700px'; // Adjust min height of overlay images
        const IMG_MAX_HEIGHT = '900px'; // Adjust max height of overlay images
        let lighthousesData = [];

        mapboxgl.accessToken = 'pk.eyJ1IjoidGFyYWh1bmRlcnRwZnVuZCIsImEiOiJjbW1ka2k5ODQwM3k0MnFyNjAwbmJvZGFiIn0.Zjbar3-1_LyPYzw4o5O6jQ';
        
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/tarahundertpfund/cmmncmexo004y01s36kz0ai55',
            center: [-98, 39],
            zoom: 4,
            maxBounds: [[-180, 8], [-16, 70]] // Symmetric around [-98, 39] to keep USA centered on wide screens
        });

        let lastZoomLevel = 4;

        function parseCSVLine(line) {
            const result = [];
            let current = "";
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (ch === ',' && !inQuotes) {
                    result.push(current);
                    current = "";
                } else {
                    current += ch;
                }
            }
            result.push(current);
            return result;
        }

        function findHeaderIndex(headers, targetName) {
            const target = targetName.toLowerCase();
            return headers.findIndex(h => (h || "").trim().toLowerCase() === target);
        }

        async function loadAndDisplayData() {
            try {
                const response = await fetch(CSV_FILE);
                const text = await response.text();
                const rows = text.trim().split(/\r?\n/);
                const headers = parseCSVLine(rows[0]);

                const nameIdx = findHeaderIndex(headers, "Name");
                const idIdx = findHeaderIndex(headers, "ID");
                const latIdx = findHeaderIndex(headers, "Latitude");
                const lonIdx = findHeaderIndex(headers, "Longitude");
                const inceptionIdx = findHeaderIndex(headers, "Date of inception");
                const stateIdx = findHeaderIndex(headers, "State");
                const countyIdx = findHeaderIndex(headers, "County");
                const satImageIdx = findHeaderIndex(headers, "satImageFN");
                const photoImageIdx = findHeaderIndex(headers, "imageFN");
                const heightIdx = findHeaderIndex(headers, "Height (m)");
                const focalHeightIdx = findHeaderIndex(headers, "Focalheight (m)");
                const rangeIdx = findHeaderIndex(headers, "Range (nm)");
                const lightCharacteristicIdx = findHeaderIndex(headers, "Light characteristic");
                const conveyedIdx = findHeaderIndex(headers, "Conveyd Lightstaition");
                const yearOfTransferIdx = findHeaderIndex(headers, "yearOfTransfer");
                const proceedsIdx = findHeaderIndex(headers, "proceeds");
                const zoomLevelIdx = findHeaderIndex(headers, "Zoomlevel");

                if (latIdx === -1 || lonIdx === -1) {
                    console.error("Latitude or Longitude columns not found");
                    return;
                }

                const features = [];
                lighthousesData = [];

                for (let i = 1; i < rows.length; i++) {
                    const columns = parseCSVLine(rows[i]);
                    const lat = parseFloat(columns[latIdx] || "0");
                    const lon = parseFloat(columns[lonIdx] || "0");

                    if (lat && lon && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
                        const name = (columns[nameIdx] || "").trim();
                        const id = (columns[idIdx] || "").trim();
                        const inception = (columns[inceptionIdx] || "").trim();
                        const state = (columns[stateIdx] || "").trim();
                        const county = (columns[countyIdx] || "").trim();
                        const satImageFromCsv = satImageIdx !== -1 ? (columns[satImageIdx] || "").trim() : "";
                        const photoImageFromCsv = photoImageIdx !== -1 ? (columns[photoImageIdx] || "").trim() : "";
                        const satImage = satImageFromCsv || (id ? `${id}.png` : "");
                        const photoImage = photoImageFromCsv || (id ? `${id}.jpg` : "");
                        const height = heightIdx !== -1 ? (columns[heightIdx] || "").trim() : "";
                        const focalHeight = focalHeightIdx !== -1 ? (columns[focalHeightIdx] || "").trim() : "";
                        const range = rangeIdx !== -1 ? (columns[rangeIdx] || "").trim() : "";
                        const lightCharacteristic = lightCharacteristicIdx !== -1 ? (columns[lightCharacteristicIdx] || "").trim() : "";
                        const conveyed = conveyedIdx !== -1 ? (columns[conveyedIdx] || "").trim() : "";
                        const yearOfTransfer = yearOfTransferIdx !== -1 ? (columns[yearOfTransferIdx] || "").trim() : "";
                        const proceeds = proceedsIdx !== -1 ? (columns[proceedsIdx] || "").trim() : "";
                        const zoomLevel = zoomLevelIdx !== -1 ? (columns[zoomLevelIdx] || "").trim() : "";

                        lighthousesData.push({
                            name,
                            inception,
                            state,
                            county,
                            lat,
                            lon,
                            satImage,
                            photoImage,
                            height,
                            focalHeight,
                            range,
                            lightCharacteristic,
                            conveyed,
                            yearOfTransfer,
                            proceeds,
                            zoomLevel
                        });

                        features.push({
                            type: "Feature",
                            geometry: {
                                type: "Point",
                                coordinates: [lon, lat]
                            },
                            properties: {
                                index: lighthousesData.length - 1,
                                name,
                                image: satImage ? `${SAT_IMAGE_FOLDER}/${satImage}` : null
                            }
                        });
                    }
                }

                const overlay = document.getElementById('overlay');
                const overlayImage = document.getElementById('overlayImage');
                const geoInfo = document.getElementById('geoInfo');
                const towerInfo = document.getElementById('towerInfo');
                const sellingInfo = document.getElementById('sellingInfo');
                const closeOverlayBtn = document.getElementById('closeOverlay');
                const tableLinkBtn = document.getElementById('tableLinkBtn');
                const firstStopBtn = document.getElementById('firstStopBtn');
                const timelineTicks = document.getElementById('timelineTicks');
                const timelineIndicator = document.getElementById('timelineIndicator');
                const timelineYear = document.getElementById('timelineYear');
                const timelineTrack = document.getElementById('timelineTrack');

                let currentLighthouseIndex = -1;
                let overlayCloseTimer = null;
                let activeMarker = null;
                let activeMarkerEl = null;
                let activeMarkerFrame = null;
                let activeMarkerImg = null;
                let zoomLabelMarker = null;
                let zoomLabelEl = null;
                let isSlideshowPaused = false;
                const AUTO_ADVANCE_DELAY = 10000; // 10 seconds overlay display
                const MARKER_MIN_SIZE = 40;
                const MARKER_MAX_SIZE = 220;
                const MARKER_CROP_PX = 7;
                const MARKER_MIN_ZOOM = 4;
                const MARKER_MAX_ZOOM = 12;
                let timelineMinYear = null;
                let timelineMaxYear = null;
                let yearToFirstIndex = new Map();
                let yearToIndexes = new Map();
                let lighthouseIndexToPercent = new Map();
                let yearToAnchorPercent = new Map();

                let currentLightCharacteristic = 'F';
                let lightTimer = null;
                let lightIsOn = true;
                const TITLE_USA_CENTER = [-98, 39];
                const TITLE_ACTIONS_OFFSET_PX = 14;

                function formatConveyedValue(value) {
                    if (value === "publicSale") return "Public Sale";
                    return value;
                }

                function setLightCharacteristic(characteristic) {
                    currentLightCharacteristic = (characteristic || 'F').trim();
                    const circle = document.querySelector('#textBox .light-circle');
                    if (!circle) return;

                    if (lightTimer) {
                        clearTimeout(lightTimer);
                        clearInterval(lightTimer);
                        lightTimer = null;
                    }

                    const normalized = currentLightCharacteristic.replace(/\s+/g, ' ').trim().toLowerCase();
                    circle.classList.remove('on', 'off');
                    lightIsOn = false;

                    const setOn = () => {
                        circle.classList.add('on');
                        circle.classList.remove('off');
                        lightIsOn = true;
                    };
                    const setOff = () => {
                        circle.classList.add('off');
                        circle.classList.remove('on');
                        lightIsOn = false;
                    };

                    const schedule = (seconds, fn) => {
                        lightTimer = setTimeout(fn, Math.max(0, seconds) * 1000);
                    };

                    // Normalize common notation forms: Fl W 5s, Fl(2) W 6s, Iso W 6s, Oc W 4s, F W
                    const cleaned = normalized.replace(/,+\s*.*$/, '').trim();

                    const fixedMatch = cleaned.match(/^f(?:\s+[wrgb])?$/i);
                    if (fixedMatch) {
                        setOn();
                        return;
                    }

                    const flMatch = cleaned.match(/^(?:fl|f?fl|fi)(?:\((\d+)\))?(?:\s+[wrgb])?\s+(\d+\.?\d*)s?$/i);
                    if (flMatch) {
                        const count = Math.max(1, parseInt(flMatch[1] || '1', 10));
                        const period = Math.max(1, parseFloat(flMatch[2] || '5'));
                        const flashOn = 0.2;
                        const interFlashOff = 0.25;

                        const runCycle = () => {
                            let flashesDone = 0;

                            const doFlash = () => {
                                if (flashesDone >= count) {
                                    const used = (count * flashOn) + (Math.max(0, count - 1) * interFlashOff);
                                    const pause = Math.max(0.2, period - used);
                                    setOff();
                                    schedule(pause, runCycle);
                                    return;
                                }

                                setOn();
                                schedule(flashOn, () => {
                                    setOff();
                                    flashesDone += 1;
                                    if (flashesDone < count) {
                                        schedule(interFlashOff, doFlash);
                                    } else {
                                        doFlash();
                                    }
                                });
                            };

                            doFlash();
                        };

                        setOff();
                        runCycle();
                        return;
                    }

                    const isoMatch = cleaned.match(/^iso(?:\s+[wrgb])?\s+(\d+\.?\d*)s?$/i);
                    if (isoMatch) {
                        const period = Math.max(1, parseFloat(isoMatch[1] || '6'));
                        const onDuration = period / 2;
                        const offDuration = period / 2;

                        const runIso = () => {
                            setOn();
                            schedule(onDuration, () => {
                                setOff();
                                schedule(offDuration, runIso);
                            });
                        };

                        runIso();
                        return;
                    }

                    const ocMatch = cleaned.match(/^oc(?:\s+[wrgb])?\s+(\d+\.?\d*)s?$/i);
                    if (ocMatch) {
                        const period = Math.max(1, parseFloat(ocMatch[1] || '4'));
                        const onDuration = period * 0.75;
                        const offDuration = period * 0.25;

                        const runOcculting = () => {
                            setOn();
                            schedule(onDuration, () => {
                                setOff();
                                schedule(offDuration, runOcculting);
                            });
                        };

                        runOcculting();
                        return;
                    }

                    // fallback: slow pulse when pattern is unknown
                    setOff();
                    const pulse = () => {
                        lightIsOn ? setOff() : setOn();
                        schedule(1.5, pulse);
                    };
                    schedule(1.5, pulse);
                }

                function resetMarkerScales() {
                    if (activeMarkerFrame) {
                        activeMarkerFrame.style.transform = 'scale(1)';
                    }
                }

                function getCurrentActiveMarkerSize() {
                    const z = map.getZoom();
                    const t = Math.max(0, Math.min(1, (z - MARKER_MIN_ZOOM) / (MARKER_MAX_ZOOM - MARKER_MIN_ZOOM)));
                    return Math.round(MARKER_MIN_SIZE + (MARKER_MAX_SIZE - MARKER_MIN_SIZE) * t);
                }

                function updateZoomLabelOffset() {
                    if (!zoomLabelMarker) return;
                    const markerSize = getCurrentActiveMarkerSize();
                    zoomLabelMarker.setOffset([0, Math.round(markerSize / 2) + 10]);
                }

                function showZoomLabel(lh) {
                    if (!zoomLabelMarker) return;
                    const zoomText = lh.zoomLevel ? `Zoom: ${lh.zoomLevel}` : "";
                    const locationText = (lh.county && lh.state)
                        ? `${lh.county}, ${lh.state}`
                        : (lh.county ? `${lh.county}` : (lh.state ? `${lh.state}` : ""));
                    const latLonText = (Number.isFinite(lh.lat) && Number.isFinite(lh.lon))
                        ? `Lat: ${lh.lat.toFixed(4)} | Lon: ${lh.lon.toFixed(4)}`
                        : "";
                    const labelLines = [zoomText, locationText, latLonText].filter(Boolean);
                    if (!labelLines.length) return;

                    zoomLabelEl.textContent = labelLines.join('\n');
                    updateZoomLabelOffset();
                    zoomLabelMarker.setLngLat([lh.lon, lh.lat]);
                    zoomLabelEl.style.display = 'block';
                }

                function hideZoomLabel() {
                    if (zoomLabelEl) zoomLabelEl.style.display = 'none';
                }

                function updateMapTitleVisibility() {
                    const titleEl = document.getElementById('mapTitle');
                    if (!titleEl) return;

                    updateMapTitlePosition();

                    // Never show the main title while a lighthouse flow is active
                    // (open popup or transitioning to the next lighthouse).
                    if (currentLighthouseIndex >= 0) {
                        titleEl.classList.remove('visible');
                        titleEl.style.opacity = '0';
                        return;
                    }

                    const currentZoom = map.getZoom();
                    if (currentZoom <= 5) {
                        titleEl.style.opacity = '';
                        titleEl.classList.add('visible');
                    } else {
                        titleEl.classList.remove('visible');
                        titleEl.style.opacity = '0';
                    }
                }

                function updateMapTitlePosition() {
                    const titleEl = document.getElementById('mapTitle');
                    if (!titleEl) return;

                    const projected = map.project(TITLE_USA_CENTER);
                    if (!projected) return;

                    titleEl.style.left = `${projected.x}px`;
                    titleEl.style.top = `${projected.y}px`;
                    updateTitleActionsPosition();
                }

                function updateTitleActionsPosition() {
                    const titleEl = document.getElementById('mapTitle');
                    const actionsEl = document.getElementById('titleActions');
                    if (!titleEl || !actionsEl) return;

                    const titleRect = titleEl.getBoundingClientRect();
                    const centerX = titleRect.left + (titleRect.width / 2);
                    const topY = titleRect.bottom + TITLE_ACTIONS_OFFSET_PX;

                    actionsEl.style.left = `${centerX}px`;
                    actionsEl.style.top = `${topY}px`;
                }

                function updateActiveMarkerScale() {
                    if (!activeMarkerFrame || currentLighthouseIndex < 0) return;

                    const size = getCurrentActiveMarkerSize();
                    const scale = size / MARKER_MIN_SIZE;
                    activeMarkerFrame.style.transform = `scale(${scale})`;
                }

                function updateActiveMarker(lh) {
                    if (!activeMarker || !activeMarkerImg) return;
                    const satSrc = lh.satImage ? `${SAT_IMAGE_FOLDER}/${lh.satImage}` : "";

                    activeMarkerImg.onerror = null;
                    activeMarkerImg.src = satSrc;
                    activeMarkerImg.onerror = () => {
                        activeMarkerImg.onerror = null;
                        activeMarkerImg.style.display = 'none';
                    };

                    activeMarkerImg.style.display = 'block';
                    activeMarker.setLngLat([lh.lon, lh.lat]);
                }

                function buildTimeline() {
                    yearToFirstIndex = new Map();
                    yearToIndexes = new Map();
                    lighthouseIndexToPercent = new Map();
                    yearToAnchorPercent = new Map();
                    lighthousesData.forEach((item, index) => {
                        const year = parseInt(item.yearOfTransfer, 10);
                        if (Number.isFinite(year)) {
                            if (!yearToFirstIndex.has(year)) {
                                yearToFirstIndex.set(year, index);
                            }
                            if (!yearToIndexes.has(year)) {
                                yearToIndexes.set(year, []);
                            }
                            yearToIndexes.get(year).push(index);
                        }
                    });

                    const years = Array.from(yearToIndexes.keys()).sort((a, b) => a - b);

                    timelineTicks.innerHTML = '';
                    timelineIndicator.style.display = 'none';

                    if (!years.length) {
                        timelineMinYear = null;
                        timelineMaxYear = null;
                        return;
                    }

                    timelineMinYear = years[0];
                    timelineMaxYear = years[years.length - 1];

                    const yearStepPercent = years.length <= 1
                        ? 100
                        : (100 / years.length);

                    years.forEach((year, yearPosition) => {
                        const anchorPercent = yearPosition * yearStepPercent;
                        yearToAnchorPercent.set(year, anchorPercent);
                    });

                    years.forEach((year, yearPosition) => {
                        const yearIndexes = yearToIndexes.get(year) || [];
                        const percent = yearToAnchorPercent.get(year) ?? 0;
                        const nextYear = years[yearPosition + 1];
                        const nextPercent = typeof nextYear === 'number'
                            ? (yearToAnchorPercent.get(nextYear) ?? percent)
                            : Math.min(100, percent + yearStepPercent);
                        const intervalWidth = Math.max(0, nextPercent - percent);

                        const label = document.createElement('div');
                        label.className = 'timelineTickLabel';
                        label.dataset.year = String(year);
                        label.textContent = String(year);
                        label.style.left = `${percent}%`;

                        const yearTicks = [];
                        const tickCount = yearIndexes.length;

                        yearIndexes.forEach((lhIndex, orderInYear) => {
                            const tick = document.createElement('div');
                            tick.className = 'timelineTick';
                            tick.dataset.year = String(year);
                            tick.dataset.index = String(lhIndex);

                            const offsetPercent = tickCount <= 1
                                ? 0
                                : (orderInYear * (intervalWidth / tickCount));
                            const tickPercent = Math.max(0, Math.min(100, percent + offsetPercent));

                            tick.style.left = `${tickPercent}%`;
                            lighthouseIndexToPercent.set(lhIndex, tickPercent);

                            tick.addEventListener('click', (event) => {
                                event.stopPropagation();
                                showLighthouse(lhIndex);
                            });

                            yearTicks.push(tick);
                            timelineTicks.appendChild(tick);
                        });

                        const setLabelHoverState = (isHovered) => {
                            label.classList.toggle('is-hovered', isHovered);
                        };

                        yearTicks.forEach((yearTick) => {
                            yearTick.addEventListener('mouseenter', () => {
                                yearTick.classList.add('is-hovered');
                                setLabelHoverState(true);
                            });
                            yearTick.addEventListener('mouseleave', () => {
                                yearTick.classList.remove('is-hovered');
                                setLabelHoverState(false);
                            });
                        });
                        label.addEventListener('mouseenter', () => {
                            setLabelHoverState(true);
                        });
                        label.addEventListener('mouseleave', () => {
                            setLabelHoverState(false);
                        });
                        label.addEventListener('click', (event) => {
                            event.stopPropagation();
                            const firstIndex = yearToFirstIndex.get(year);
                            if (typeof firstIndex === 'number') {
                                showLighthouse(firstIndex);
                            }
                        });
                        
                        timelineTicks.appendChild(label);
                    });
                }

                function jumpToLighthouseFromPosition(clientX) {
                    if (!lighthouseIndexToPercent.size) return;

                    const rect = timelineTrack.getBoundingClientRect();
                    if (!rect.width) return;

                    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                    const targetPercent = ratio * 100;

                    let nearestIndex = null;
                    let nearestDistance = Infinity;
                    lighthouseIndexToPercent.forEach((tickPercent, index) => {
                        const distance = Math.abs(tickPercent - targetPercent);
                        if (distance < nearestDistance) {
                            nearestDistance = distance;
                            nearestIndex = index;
                        }
                    });

                    if (typeof nearestIndex === 'number') {
                        showLighthouse(nearestIndex);
                    }
                }

                function updateTimelineIndicator(yearValue) {
                    if (timelineMinYear === null || timelineMaxYear === null) return;

                    const percent = lighthouseIndexToPercent.get(yearValue);
                    if (typeof percent !== 'number') {
                        timelineIndicator.style.display = 'none';
                        return;
                    }

                    timelineIndicator.style.left = `${percent}%`;
                    timelineIndicator.style.display = 'block';
                }

                function updateCurrentTimelineTick(indexValue) {
                    const allTicks = timelineTicks.querySelectorAll('.timelineTick.current-year');
                    allTicks.forEach((tick) => tick.classList.remove('current-year'));
                    const allLabels = timelineTicks.querySelectorAll('.timelineTickLabel.current-year');
                    allLabels.forEach((label) => label.classList.remove('current-year'));

                    const currentTick = timelineTicks.querySelector(`.timelineTick[data-index="${indexValue}"]`);
                    if (currentTick) {
                        currentTick.classList.add('current-year');
                        const currentYear = currentTick.dataset.year;
                        const currentLabel = timelineTicks.querySelector(`.timelineTickLabel[data-year="${currentYear}"]`);
                        if (currentLabel) {
                            currentLabel.classList.add('current-year');
                        }
                    }
                }

                function showLighthouse(index) {
                    if (index < 0 || index >= lighthousesData.length) return;
                    
                    currentLighthouseIndex = index;
                    updatePauseButtonVisibility();
                    const lh = lighthousesData[index];
                    updateActiveMarker(lh);
                    updateActiveMarkerScale();
                    updateTimelineIndicator(index);
                    updateCurrentTimelineTick(index);
                    
                    // Clear any existing overlay close timer
                    if (overlayCloseTimer) {
                        clearTimeout(overlayCloseTimer);
                    }
                    
                    // Close overlay while flying
                    overlay.classList.remove('visible');
                    overlay.setAttribute('aria-hidden', 'true');
                    hideZoomLabel();
                    // Hide mapTitle instantly (no fade)
                    const mapTitle = document.getElementById('mapTitle');
                    if (mapTitle) {
                        mapTitle.classList.remove('visible');
                        mapTitle.style.opacity = '0';
                    }

                    const imageSrc = lh.photoImage ? `${PHOTO_IMAGE_FOLDER}/${lh.photoImage}` : (lh.satImage ? `${SAT_IMAGE_FOLDER}/${lh.satImage}` : "");
                    if (!imageSrc) return;

                    // Pre-load image with safe fallback (avoid infinite onerror loops)
                    const satFallbackSrc = lh.satImage ? `${SAT_IMAGE_FOLDER}/${lh.satImage}` : "";
                    overlayImage.onerror = null;
                    overlayImage.src = imageSrc;
                    overlayImage.style.minHeight = '';
                    overlayImage.style.maxHeight = '';
                    overlayImage.onerror = () => {
                        overlayImage.onerror = null;
                        if (satFallbackSrc && satFallbackSrc !== imageSrc) {
                            overlayImage.src = satFallbackSrc;
                        } else {
                            console.warn(`Missing overlay image for: ${lh.name}`);
                            overlay.classList.remove('visible');
                            overlay.setAttribute('aria-hidden', 'true');
                        }
                    };
                    
                    // Update overlay content with two info sections
                    textBox.innerHTML = `
                        <div class="info-columns">
                            <div class="info-section">
                                <div class="info-section-title">General information</div>
                                <div class="info-item"><strong>${lh.name.toUpperCase()}</strong> (${lh.inception})</div>
                                <div class="info-item">Conveyed to: <strong>${formatConveyedValue(lh.conveyed)}</strong></div>
                                ${lh.proceeds ? `<div class="info-item">Proceeds: <strong>${lh.proceeds}</strong></div>` : ""}
                                <div class="info-item">Year of transfer: ${lh.yearOfTransfer}</div>
                            </div>
                            <div class="info-section">
                                <div class="info-section-title">Characteristics</div>
                                <div class="info-item">Height: ${lh.height}</div>
                                <div class="info-item">Focal height: ${lh.focalHeight}</div>
                                <div class="info-item">Light characteristic: ${lh.lightCharacteristic}</div>
                                <div class="light-circle" aria-hidden="true"></div>
                            </div>
                        </div>
                    `;
                    
                    // Keep geo/tower/selling containers available for compatibility (empty)
                    geoInfo.innerHTML = '';
                    towerInfo.innerHTML = '';
                    sellingInfo.innerHTML = '';

                    setLightCharacteristic(lh.lightCharacteristic);

                    // Off-center anchor: keep destination lighthouse in the middle of the left side
                    const flyOffset = [
                        Math.round(window.innerWidth * -0.25),
                        Math.round(window.innerHeight * -0.08)
                    ];
                    
                    // Fly to lighthouse
                    map.flyTo({
                        center: [lh.lon, lh.lat],
                        zoom: 12,
                        duration: 3000,
                        offset: flyOffset,
                        essential: true
                    });
                    
                    // Open overlay and auto-close after 10 seconds
                    map.once('moveend', () => {
                        overlay.classList.add('visible');
                        overlay.setAttribute('aria-hidden', 'false');
                        updateActiveMarkerScale();
                        showZoomLabel(lh);
                        
                        // Position overlay image in center of right-side overlay stage
                        overlayImage.style.top = '50%';
                        overlayImage.style.left = '50%';
                        
                        function scheduleNextLighthouse() {
                            if (overlayCloseTimer) {
                                clearTimeout(overlayCloseTimer);
                                overlayCloseTimer = null;
                            }
                            if (isSlideshowPaused) return;
                            overlayCloseTimer = setTimeout(() => {
                                overlay.classList.remove('visible');
                                overlay.setAttribute('aria-hidden', 'true');
                                hideZoomLabel();
                                const nextIndex = (currentLighthouseIndex + 1) % lighthousesData.length;
                                showLighthouse(nextIndex);
                            }, AUTO_ADVANCE_DELAY);
                        }

                        scheduleNextLighthouse();
                    });
                }

                function openOverlay(lh) {
                    const index = lighthousesData.indexOf(lh);
                    if (index !== -1) {
                        showLighthouse(index);
                    }
                }

                function closeOverlay() {
                    overlay.classList.remove('visible');
                    overlay.setAttribute('aria-hidden', 'true');
                    hideZoomLabel();

                    if (overlayCloseTimer) {
                        clearTimeout(overlayCloseTimer);
                        overlayCloseTimer = null;
                    }
                    
                    currentLighthouseIndex = -1;
                    updatePauseButtonVisibility();
                    resetMarkerScales();
                    if (activeMarkerImg) activeMarkerImg.style.display = 'none';
                    timelineIndicator.style.display = 'none';
                    updateCurrentTimelineTick(-1);
                    isSlideshowPaused = false;
                    updatePauseButtonLabel();

                    // Return map to full view state on close
                    map.flyTo({
                        center: [-98, 39],
                        zoom: 4,
                        duration: 800,
                        essential: true
                    });
                }

                const pauseBtn = document.getElementById('pauseBtn');
                const timelineEl = document.getElementById('timeline');
                function updatePauseButtonVisibility() {
                    if (!timelineEl) return;
                    timelineEl.classList.toggle('is-slideshow-active', currentLighthouseIndex >= 0);
                }

                function updatePauseButtonLabel() {
                    if (!pauseBtn) return;
                    pauseBtn.textContent = isSlideshowPaused ? 'Resume' : 'Pause';
                    pauseBtn.classList.toggle('is-active', isSlideshowPaused);
                }

                if (pauseBtn) {
                    pauseBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        isSlideshowPaused = !isSlideshowPaused;
                        if (overlayCloseTimer) {
                            clearTimeout(overlayCloseTimer);
                            overlayCloseTimer = null;
                        }
                        if (!isSlideshowPaused && overlay.classList.contains('visible')) {
                            const nextIndex = (currentLighthouseIndex + 1) % lighthousesData.length;
                            overlayCloseTimer = setTimeout(() => {
                                overlay.classList.remove('visible');
                                overlay.setAttribute('aria-hidden', 'true');
                                showLighthouse(nextIndex);
                            }, AUTO_ADVANCE_DELAY);
                        }
                        updatePauseButtonLabel();
                    });
                }

                if (firstStopBtn) {
                    firstStopBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (!lighthousesData.length) return;

                        let firstIndex = 0;
                        if (timelineMinYear !== null) {
                            const mapped = yearToFirstIndex.get(timelineMinYear);
                            if (typeof mapped === 'number') {
                                firstIndex = mapped;
                            }
                        }

                        showLighthouse(firstIndex);
                    });
                }

                updatePauseButtonLabel();
                updatePauseButtonVisibility();

                closeOverlayBtn.addEventListener('click', closeOverlay);
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeOverlay();
                });
                timelineTrack.addEventListener('click', (event) => {
                    jumpToLighthouseFromPosition(event.clientX);
                });

                map.on('load', () => {
                    map.jumpTo({
                        center: TITLE_USA_CENTER,
                        zoom: 4
                    });

                    buildTimeline();
                    updateMapTitlePosition();
                    updateTitleActionsPosition();
                    updateMapTitleVisibility();

                    // Create image markers for each lighthouse
                    lighthousesData.forEach((lh) => {
                        const markerEl = document.createElement('div');
                        markerEl.style.cursor = 'pointer';

                        const markerFrame = document.createElement('div');
                        markerFrame.style.width = `${MARKER_MIN_SIZE}px`;
                        markerFrame.style.height = `${MARKER_MIN_SIZE}px`;
                        markerFrame.style.overflow = 'hidden';
                        markerFrame.style.transition = 'transform 200ms ease';
                        markerFrame.style.transformOrigin = 'center center';
                        markerFrame.style.willChange = 'transform';

                        const markerImg = document.createElement('img');
                        markerImg.alt = lh.name;
                        markerImg.className = 'lighthouse-marker';
                        markerImg.style.width = `${MARKER_MIN_SIZE + (MARKER_CROP_PX * 2)}px`;
                        markerImg.style.height = `${MARKER_MIN_SIZE + (MARKER_CROP_PX * 2)}px`;
                        markerImg.style.marginLeft = `-${MARKER_CROP_PX}px`;
                        markerImg.style.marginTop = `-${MARKER_CROP_PX}px`;
                        markerImg.style.objectFit = 'cover';
                        markerImg.style.boxShadow = '0 2px 6px rgba(0,0,0,0.4)';
                        markerFrame.appendChild(markerImg);
                        markerEl.appendChild(markerFrame);
                        
                        const imageSrc = lh.satImage ? `${SAT_IMAGE_FOLDER}/${lh.satImage}` : "";
                        if (imageSrc) {
                            markerImg.src = imageSrc;
                            markerImg.onerror = () => {
                                markerEl.style.display = 'none';
                            };
                        }
                        
                        // Create and add marker
                        new mapboxgl.Marker({
                            element: markerEl
                        })
                            .setLngLat([lh.lon, lh.lat])
                            .addTo(map);
                        
                        // Open overlay on marker click
                        markerEl.addEventListener('click', () => {
                            openOverlay(lh);
                        });
                        
                        // Add hover effect
                        markerEl.addEventListener('mouseenter', () => {
                            markerFrame.style.transform = 'scale(1.2)';
                        });
                        markerEl.addEventListener('mouseleave', () => {
                            markerFrame.style.transform = 'scale(1)';
                        });
                    });

                    // Create one reusable active image marker (performance)
                    activeMarkerEl = document.createElement('div');
                    activeMarkerEl.style.pointerEvents = 'none';

                    activeMarkerFrame = document.createElement('div');
                    activeMarkerFrame.style.width = `${MARKER_MIN_SIZE}px`;
                    activeMarkerFrame.style.height = `${MARKER_MIN_SIZE}px`;
                    activeMarkerFrame.style.overflow = 'hidden';
                    activeMarkerFrame.style.transition = 'transform 200ms ease';
                    activeMarkerFrame.style.transformOrigin = 'center center';
                    activeMarkerFrame.style.willChange = 'transform';

                    activeMarkerImg = document.createElement('img');
                    activeMarkerImg.alt = 'Active lighthouse marker';
                    activeMarkerImg.style.width = `${MARKER_MIN_SIZE + (MARKER_CROP_PX * 2)}px`;
                    activeMarkerImg.style.height = `${MARKER_MIN_SIZE + (MARKER_CROP_PX * 2)}px`;
                    activeMarkerImg.style.marginLeft = `-${MARKER_CROP_PX}px`;
                    activeMarkerImg.style.marginTop = `-${MARKER_CROP_PX}px`;
                    activeMarkerImg.style.objectFit = 'cover';
                    activeMarkerImg.style.display = 'none';
                    activeMarkerFrame.appendChild(activeMarkerImg);
                    activeMarkerEl.appendChild(activeMarkerFrame);

                    activeMarker = new mapboxgl.Marker({
                        element: activeMarkerEl
                    })
                        .setLngLat([0, 0])
                        .addTo(map);

                    resetMarkerScales();

                    // Create zoom label marker (positioned below the active marker)
                    zoomLabelEl = document.createElement('div');
                    zoomLabelEl.className = 'zoom-label';
                    zoomLabelEl.style.display = 'none';
                    zoomLabelMarker = new mapboxgl.Marker({
                        element: zoomLabelEl,
                        anchor: 'top',
                        offset: [0, Math.round(MARKER_MIN_SIZE / 2) + 8]
                    })
                        .setLngLat([0, 0])
                        .addTo(map);
                    updateZoomLabelOffset();

                    let zoomRaf = null;
                    map.on('zoom', () => {
                        if (zoomRaf) return;
                        zoomRaf = requestAnimationFrame(() => {
                            updateActiveMarkerScale();
                            updateZoomLabelOffset();
                            updateMapTitlePosition();
                            updateTitleActionsPosition();
                            updateMapTitleVisibility();
                            zoomRaf = null;
                        });
                    });

                    map.on('move', updateMapTitlePosition);
                    map.on('resize', updateMapTitlePosition);

                    map.on('zoomend', () => {
                        const currentZoom = map.getZoom();
                        if (overlay.classList.contains('visible') && currentZoom < lastZoomLevel) {
                            closeOverlay();
                        }
                        lastZoomLevel = currentZoom;
                        updateMapTitleVisibility();
                    });
                });

            } catch (error) {
                console.error('Error loading CSV:', error);
            }
        }

        loadAndDisplayData();
    </script>
</body>
</html>
